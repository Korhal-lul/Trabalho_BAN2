{% extends 'base.html' %}

{% block conteudo %}

<div class="d-flex justify-content-between">

<h2>Clientes</h2>

<a href="/clientes/novo"
class="btn btn-primary">

Novo Cliente

</a>

</div>

<table class="table table-striped mt-3">

<thead>

<tr>
<th>ID</th>
<th>Telefone</th>
<th>Email</th>
<th>Tipo</th>
</tr>

</thead>

<tbody>

{% for c in clientes %}

<tr>

<td>{{ c[0] }}</td>
<td>{{ c[1] }}</td>
<td>{{ c[2] }}</td>
<td>{{ c[3] }}</td>

</tr>

{% endfor %}

</tbody>

</table>

{% endblock %}
